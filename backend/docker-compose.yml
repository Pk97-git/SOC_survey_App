version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: facility-survey-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facility_survey_db
    ports:
      - "5433:5432" # Map host 5433 to container 5432 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - survey-network

  backend:
    build: .
    container_name: facility-survey-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=facility_survey_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - NODE_ENV=${NODE_ENV:-production}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - survey-network

networks:
  survey-network:
    driver: bridge

volumes:
  postgres_data:
